<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arun Kumar R -- Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

<style>
  :root{
    --bg:#0C0C0C;
    --ink:#D7E2EA;
    --grad-top:#00D4FF;
    --grad-bot:#B600A8;
    --white:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:var(--bg);}
  body{font-family:'Kanit',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:clip;}
  #root{background:var(--bg);overflow-x:clip;}
  a{color:inherit;text-decoration:none;}
  img,svg{display:block;}

  .hero-heading{
    background:linear-gradient(180deg,#00D4FF 0%, #B600A8 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  /* ---------- HERO (from our version) ---------- */
  .hero{
    min-height:100vh;display:flex;flex-direction:column;position:relative;overflow-x:clip;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.hero-nav{
    display:flex;justify-content:space-between;align-items:center;
    padding:28px 24px 0; z-index:20; position:relative;
  }
  nav.hero-nav a{
    color:var(--ink);font-weight:500;text-transform:uppercase;letter-spacing:.1em;
    font-size:14px;transition:opacity .2s ease;
  }
  nav.hero-nav a:hover{color:#00D4FF; opacity:1;}
  .nav-mark{font-weight:700;letter-spacing:.05em;font-size:15px;background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;text-transform:uppercase;}
  .hero-center{
    flex:1 1 auto;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    width:100%;
    min-height:0;
  }
  .hero-heading-wrap{
    overflow:hidden;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:center;
  }
  h1.hero-title{
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:-.02em;
    line-height:.92;
    white-space:nowrap;
    text-align:center;
    font-size:clamp(14vw, 15vw, 17.5vw);
    margin:0 auto;
    width:100%;
  }
  .hero-bottom{
    display:flex;justify-content:space-between;align-items:flex-end;
    padding:0 24px 40px; position:relative; z-index:20; margin-top:auto;
    gap:20px;
  }
  .hero-bottom p{
    color:#D7E2EA;font-weight:300;text-transform:uppercase;letter-spacing:.06em;
    line-height:1.35; font-size:clamp(.75rem,1.6vw,1.15rem); max-width:260px;
  }

  /* Contact button */
  .btn-contact{
    display:inline-flex;align-items:center;justify-content:center;
    border-radius:999px;
    padding:14px 40px;
    background:linear-gradient(123deg,#18011F 7%,#B600A8 37%,#7621B0 72%,#BE4C00 100%);
    box-shadow:0px 4px 4px rgba(181,1,167,.25), 4px 4px 12px #7721B1 inset;
    outline:2px solid #fff; outline-offset:-3px;
    color:#fff;font-weight:500;text-transform:uppercase;letter-spacing:.15em;
    font-size:14px; white-space:nowrap;
    cursor:pointer; border:none;
  }
  .btn-ghost{
    display:inline-flex;align-items:center;justify-content:center;
    border-radius:999px;padding:12px 30px;
    border:2px solid rgba(0,212,255,.4); color:var(--ink);
    font-weight:500;text-transform:uppercase;letter-spacing:.15em;
    font-size:13px;white-space:nowrap;transition:background .2s ease;
  }
  .btn-ghost:hover{background:rgba(215,226,234,.1);}

  /* Canvas */
  .hero-canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}

  /* Floating icons */
  @keyframes float{0%,100%{transform:translateY(0px);}50%{transform:translateY(-20px);}}
  @keyframes float2{0%,100%{transform:translateY(0px);}50%{transform:translateY(-15px);}}
  @keyframes pulse-glow{0%,100%{opacity:0.3;}50%{opacity:1;}}
  .float-icon{position:absolute;pointer-events:none;}

  /* Typewriter */
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  /* ---------- MARQUEE (from uploaded) ---------- */
  .marquee-section{background:linear-gradient(180deg,#0C0C0C 0%,rgba(0,212,255,.03) 50%,#0C0C0C 100%); padding:96px 0 40px; overflow:hidden;}
  .m-row{display:flex; gap:12px; will-change:transform;}
  .m-row + .m-row{margin-top:12px;}
  .m-tile{
    flex:0 0 auto; width:230px; height:150px; border-radius:20px;
    background:linear-gradient(155deg,rgba(0,212,255,.06) 0%,rgba(182,0,168,.04) 65%);
    border:1px solid rgba(215,226,234,.12);
    display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between;
    padding:18px; position:relative; overflow:hidden;
  }
  .m-tile::after{
    content:''; position:absolute; inset:0; opacity:.5;
    background:radial-gradient(120px 90px at 85% 15%, rgba(182,0,168,.35), transparent 70%);
  }
  .m-tile svg{width:30px;height:30px; position:relative; z-index:1;}
  .m-tile span{
    color:#D7E2EA; font-weight:500; font-size:14px; letter-spacing:.02em;
    position:relative; z-index:1; line-height:1.2;
  }

  /* ---------- ABOUT (from uploaded) ---------- */
  .about{
    min-height:100vh; position:relative; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:120px 20px; overflow:hidden;
  }
  .about-deco{position:absolute; opacity:.9; filter:drop-shadow(0 0 10px rgba(0,212,255,.3));}
  .about h2{
    font-weight:900;text-transform:uppercase;line-height:.95;letter-spacing:-.02em;
    font-size:clamp(3rem,12vw,160px); margin-bottom:44px;
  }
  .about-text{
    color:#D7E2EA; font-weight:500; max-width:600px; line-height:1.6;
    font-size:clamp(1rem,2vw,1.35rem); margin:0 auto 64px; text-align:center;
  }
  .about-text .ch{ transition:opacity .05s linear; }

  /* ---------- SKILLS (from uploaded) ---------- */
  .skills{
    background:var(--white); border-radius:44px 44px 0 0;
    padding:96px 20px; position:relative; z-index:1;
  }
  .skills h2{
    background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:900; text-transform:uppercase; text-align:center;
    font-size:clamp(3rem,12vw,160px); margin-bottom:80px; line-height:.95;
  }
  .skill-list{max-width:980px; margin:0 auto;}
  .skill-item{
    display:flex; align-items:center; gap:28px; padding:36px 0;
    border-top:1px solid rgba(0,212,255,.2);
  }
  .skill-item:last-child{border-bottom:1px solid rgba(182,0,168,.2);}
  .skill-num{
    font-weight:900; background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-size:clamp(2.6rem,8vw,110px); line-height:1;
    flex:0 0 auto; width:110px;
  }
  .skill-name{background:linear-gradient(90deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:500; text-transform:uppercase; font-size:clamp(1rem,2.2vw,1.7rem); margin-bottom:8px;}
  .skill-desc{color:#0C0C0C; opacity:.7; font-weight:300; line-height:1.55; font-size:clamp(.85rem,1.5vw,1.1rem); max-width:620px;}

  /* ---------- PROJECTS (from uploaded) ---------- */
  .projects{
    background:var(--bg); border-radius:44px 44px 0 0; margin-top:-40px; position:relative; z-index:2;
    padding:80px 20px 40px;
  }
  .projects h2{
    font-weight:900; text-transform:uppercase; text-align:center; line-height:.95;
    letter-spacing:-.02em; font-size:clamp(3rem,12vw,160px); margin-bottom:40px;
  }
  .stack{max-width:1200px; margin:0 auto;}
  .card-slot{height:85vh; position:sticky; top:90px; display:flex; align-items:flex-start;}
  .p-card{
    width:100%; border-radius:44px; border:2px solid rgba(0,212,255,.4); background:var(--bg);
    padding:22px; transform-origin:top center; will-change:transform;
  }
  .p-top{display:flex; align-items:center; gap:20px; flex-wrap:wrap; margin-bottom:22px;}
  .p-num{font-weight:900; font-size:clamp(2.4rem,8vw,90px); background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; line-height:1; flex:0 0 auto;}
  .p-meta{flex:1 1 auto; min-width:160px;}
  .p-cat{color:#00D4FF; opacity:.8; text-transform:uppercase; letter-spacing:.12em; font-size:12px; margin-bottom:4px;}
  .p-name{color:#fff; text-shadow:0 0 30px rgba(0,212,255,.3); font-weight:600; text-transform:uppercase; font-size:clamp(1.1rem,2.8vw,1.9rem);}
  .p-badge{flex:0 0 auto; margin-left:auto;}
  .p-grid{display:flex; gap:14px;}
  .p-col1{width:40%; display:flex; flex-direction:column; gap:14px;}
  .p-col2{width:60%;}
  .p-tile{
    border-radius:32px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px;
    border:1px solid rgba(182,0,168,.2);
  }
  .p-tile svg{width:38%; max-width:70px;}
  .p-tile span{color:var(--ink); font-size:12px; text-transform:uppercase; letter-spacing:.08em; opacity:.75; text-align:center; padding:0 10px;}
  .p-col1 .p-tile:nth-child(1){height:clamp(120px,16vw,200px);}
  .p-col1 .p-tile:nth-child(2){height:clamp(150px,22vw,300px);}
  .p-col2 .p-tile{height:100%; min-height:clamp(270px,38vw,500px);}

  /* ---------- JOURNEY (from uploaded) ---------- */
  .journey{background:linear-gradient(180deg,#0C0C0C 0%,rgba(182,0,168,.03) 100%); padding:100px 20px 40px; max-width:1100px; margin:0 auto;}
  .journey h3{
    background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase; letter-spacing:.1em; font-weight:600;
    font-size:14px; margin-bottom:26px; text-align:center;
  }
  .journey-grid{display:grid; grid-template-columns:1fr; gap:1px; background:linear-gradient(180deg,rgba(0,212,255,.15),rgba(182,0,168,.15)); border-radius:24px; overflow:hidden;}
  @media(min-width:768px){ .journey-grid{grid-template-columns:1fr 1fr;} }
  .journey-cell{background:var(--bg); padding:28px;}
  .journey-cell .role{background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; font-weight:600; font-size:16px; margin-bottom:4px;}
  .journey-cell .org{color:#00D4FF; opacity:.8; font-size:13px; margin-bottom:10px;}
  .journey-cell .desc{color:#B600A8; opacity:.7; font-size:13px; line-height:1.5;}

  /* ---------- FOOTER (from uploaded) ---------- */
  footer{
    padding:100px 20px 60px; text-align:center; background:var(--bg);
  }
  footer h2{font-weight:900; text-transform:uppercase; font-size:clamp(2.4rem,10vw,120px); line-height:.95; margin-bottom:26px; background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;}
  footer p.sub{color:#00D4FF; opacity:.8; margin-bottom:36px; font-size:15px;}
  .contact-row{display:flex; flex-wrap:wrap; gap:16px; justify-content:center; margin-bottom:56px;}
  .foot-links{display:flex; gap:28px; justify-content:center; flex-wrap:wrap; background:linear-gradient(180deg,#00D4FF 0%,#B600A8 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; opacity:.7; font-size:13px; letter-spacing:.05em; text-transform:uppercase;}

  /* Fade utility */
  .fade{opacity:0;will-change:transform,opacity;transition:opacity .7s cubic-bezier(.25,.1,.25,1), transform .7s cubic-bezier(.25,.1,.25,1);}
  .fade.in{opacity:1;transform:translate(0,0) !important;}

  @media(max-width:640px){
    .hero-bottom{flex-direction:row; align-items:flex-end;}
    .p-grid{gap:10px;}
    nav.hero-nav a{font-size:11px;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { motion, useScroll, useTransform, useInView } = window.Motion;

// ==================== REUSABLE COMPONENTS ====================

const FadeIn = ({ children, delay = 0, duration = 0.7, x = 0, y = 30, className = "" }) => {
    const ref = useRef(null);
    const isInView = useInView(ref, { once: true, margin: "50px", amount: 0 });
    return (
        <motion.div
            ref={ref}
            initial={{ opacity: 0, x, y }}
            animate={isInView ? { opacity: 1, x: 0, y: 0 } : { opacity: 0, x, y }}
            transition={{ duration, delay, ease: [0.25, 0.1, 0.25, 1] }}
            className={className}
        >
            {children}
        </motion.div>
    );
};

// ==================== HERO ANIMATION (CANVAS) ====================

const HeroAnimation = () => {
    const canvasRef = useRef(null);
    useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const resize = () => {
            canvas.width = canvas.offsetWidth * window.devicePixelRatio;
            canvas.height = canvas.offsetHeight * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        };
        resize();
        window.addEventListener('resize', resize);

        const particles = [];
        const numParticles = 60;
        for (let i = 0; i < numParticles; i++) {
            particles.push({
                x: Math.random() * canvas.offsetWidth,
                y: Math.random() * canvas.offsetHeight,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                color: Math.random() > 0.5 ? '#B600A8' : '#00D4FF',
                life: Math.random() * 100,
                maxLife: 100 + Math.random() * 100
            });
        }

        const nodes = [];
        const numNodes = 12;
        for (let i = 0; i < numNodes; i++) {
            nodes.push({
                x: Math.random() * canvas.offsetWidth,
                y: Math.random() * canvas.offsetHeight,
                radius: Math.random() * 20 + 10,
                pulse: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.03,
                type: Math.random() > 0.5 ? 'chip' : 'web'
            });
        }

        let animationId;
        let time = 0;

        const draw = () => {
            ctx.clearRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
            time += 0.016;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        const opacity = (1 - dist / 150) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        const midX = (particles[i].x + particles[j].x) / 2;
                        ctx.lineTo(midX, particles[i].y);
                        ctx.lineTo(midX, particles[j].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(182, 0, 168, ${opacity})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            nodes.forEach(node => {
                node.pulse += node.speed;
                const glowSize = node.radius + Math.sin(node.pulse) * 5;
                const gradient = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, glowSize * 2);
                gradient.addColorStop(0, node.type === 'chip' ? 'rgba(0, 212, 255, 0.3)' : 'rgba(182, 0, 168, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(node.x, node.y, glowSize * 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = node.type === 'chip' ? '#00D4FF' : '#B600A8';
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = node.type === 'chip' ? 'rgba(0, 212, 255, 0.5)' : 'rgba(182, 0, 168, 0.5)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
                ctx.stroke();
                if (node.type === 'chip') {
                    for (let k = 0; k < 4; k++) {
                        const angle = (k * Math.PI / 2) + time * 0.5;
                        const pinX = node.x + Math.cos(angle) * (node.radius + 8);
                        const pinY = node.y + Math.sin(angle) * (node.radius + 8);
                        ctx.fillStyle = '#00D4FF';
                        ctx.beginPath();
                        ctx.arc(pinX, pinY, 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    for (let k = 0; k < 3; k++) {
                        const angle = (k * Math.PI * 2 / 3) + time * 0.3;
                        const dotX = node.x + Math.cos(angle) * (node.radius + 6);
                        const dotY = node.y + Math.sin(angle) * (node.radius + 6);
                        ctx.fillStyle = '#B600A8';
                        ctx.beginPath();
                        ctx.arc(dotX, dotY, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            });

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life++;
                if (p.life > p.maxLife) {
                    p.life = 0;
                    p.x = Math.random() * canvas.offsetWidth;
                    p.y = Math.random() * canvas.offsetHeight;
                }
                if (p.x < 0 || p.x > canvas.offsetWidth) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.offsetHeight) p.vy *= -1;
                const alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.8;
                ctx.fillStyle = p.color;
                ctx.globalAlpha = alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            ctx.font = '14px monospace';
            ctx.fillStyle = 'rgba(0, 212, 255, 0.15)';
            ctx.fillText('{ }', 50 + Math.sin(time) * 30, 100 + Math.cos(time * 0.7) * 20);
            ctx.fillText('< />', canvas.offsetWidth - 100 + Math.cos(time * 0.8) * 20, 150 + Math.sin(time) * 30);
            ctx.fillText('</>', 80 + Math.cos(time * 1.2) * 25, canvas.offsetHeight - 80 + Math.sin(time * 0.9) * 20);
            ctx.fillText('{ }', canvas.offsetWidth - 80 + Math.sin(time * 0.6) * 30, canvas.offsetHeight - 100 + Math.cos(time) * 25);

            ctx.strokeStyle = 'rgba(0, 212, 255, 0.08)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 5; i++) {
                const y = canvas.offsetHeight - 40 - i * 15;
                ctx.beginPath();
                ctx.moveTo(0, y);
                for (let x = 0; x < canvas.offsetWidth; x += 40) {
                    ctx.lineTo(x + 20, y);
                    ctx.lineTo(x + 20, y - (i % 2 === 0 ? 10 : -10));
                    ctx.lineTo(x + 40, y - (i % 2 === 0 ? 10 : -10));
                    ctx.lineTo(x + 40, y);
                }
                ctx.stroke();
            }

            animationId = requestAnimationFrame(draw);
        };

        draw();
        return () => {
            cancelAnimationFrame(animationId);
            window.removeEventListener('resize', resize);
        };
    }, []);

    return <canvas ref={canvasRef} className="hero-canvas" />;
};

// ==================== HERO SECTION ====================

const HeroSection = () => {
    const [typedText, setTypedText] = useState('');
    const fullText = 'Electronics Engineer × Web Developer';

    useEffect(() => {
        let i = 0;
        const timer = setInterval(() => {
            if (i <= fullText.length) {
                setTypedText(fullText.slice(0, i));
                i++;
            } else {
                clearInterval(timer);
            }
        }, 60);
        return () => clearInterval(timer);
    }, []);

    return (
        <section className="hero">
            <HeroAnimation />

            <FadeIn delay={0} y={-20}>
                <nav className="hero-nav">
                    <span className="nav-mark">AK.R</span>
                    <div style={{display:'flex',gap:'22px'}}>
                        <a href="#about">About</a>
                        <a href="#skills">Skills</a>
                        <a href="#projects">Projects</a>
                        <a href="#contact">Contact</a>
                    </div>
                </nav>
            </FadeIn>

            <div className="hero-center">
                <div className="hero-heading-wrap">
                    <FadeIn delay={0.15} y={40} style={{width:'100%',display:'flex',justifyContent:'center'}}>
                        <h1 className="hero-title hero-heading">Hi, i&apos;m arun</h1>
                    </FadeIn>
                </div>

                <FadeIn delay={0.5} y={20}>
                    <div style={{textAlign:'center', marginTop:'16px', position:'relative', zIndex:10}}>
                        <p style={{color:'#00D4FF', fontFamily:'monospace', fontSize:'clamp(12px, 1.5vw, 18px)', letterSpacing:'0.1em'}}>
                            <span style={{color:'#B600A8'}}>&lt;</span>
                            {typedText}
                            <span style={{color:'#B600A8'}}> /&gt;</span>
                            <span style={{display:'inline-block', width:'2px', height:'1.2em', background:'#B600A8', marginLeft:'4px', verticalAlign:'middle', animation:'blink 1s step-end infinite'}}></span>
                        </p>
                    </div>
                </FadeIn>
            </div>

    useEffect(() => {
        const handleScroll = () => {
            if (!sectionRef.current) return;
            const sectionTop = sectionRef.current.offsetTop;
            const scrollOffset = (window.scrollY - sectionTop + window.innerHeight) * 0.3;
            setOffset(scrollOffset);
        };
        window.addEventListener("scroll", handleScroll, { passive: true });
        handleScroll();
        return () => window.removeEventListener("scroll", handleScroll);

        let html = '';
        for(let t=0; t<3; t++){

            <div className="m-row" style={{transform: `translateX(${-(offset - 200)}px)`}} dangerouslySetInnerHTML={{__html: buildRow(row2Tags, row2Icons)}} />
        </section>
    );
};

const AboutSection = () => {
    const aboutRef = useRef(null);
    const aboutParagraph = "Motivated electronics and communication engineer with a strong foundation in C programming, embedded systems, and the internet of things. I build responsive web applications with HTML, CSS, and JavaScript, and manage websites through WordPress. I enjoy turning practical, real-world problems into working prototypes — and I'm always looking for the next one to build.";

    useEffect(() => {
        const el = aboutRef.current;
        if(!el) return;
        const chars = aboutParagraph.split('');
        el.innerHTML = chars.map(c => '<span class="ch" style="opacity:.2">'+ c +'</span>').join('');
        const chSpans = el.querySelectorAll('.ch');

        function updateAboutChars(){
            const rect = el.getBoundingClientRect();
            const vh = window.innerHeight;
            const start = vh*0.8, end = vh*0.2;
            const progress = Math.min(1, Math.max(0, (start - rect.top) / (start - end + rect.height)));
            const n = chSpans.length;
            chSpans.forEach(function(span, i){
                const charProgress = i/n;
                const local = (progress - charProgress) * 6;
                const op = Math.min(1, Math.max(0.2, 0.2 + local*0.8));
                span.style.opacity = op;
            });
        }

        window.addEventListener('scroll', updateAboutChars, { passive:true });
        window.addEventListener('resize', updateAboutChars, { passive:true });
        updateAboutChars();
        return () => {
            window.removeEventListener('scroll', updateAboutChars);
            window.removeEventListener('resize', updateAboutChars);
        };
    }, []);

    return (
        <section className="about" id="about">
            <div className="about-deco" style={{top:'4%',left:'2%',width:'120px'}}>
                <svg viewBox="0 0 100 100" width="100%"><circle cx="50" cy="50" r="46" fill="none" stroke="#00D4FF" strokeWidth="2"/><circle cx="50" cy="50" r="20" fill="none" stroke="#B600A8" strokeWidth="1.4"/></svg>
